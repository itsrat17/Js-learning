<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rachit's Space.</title>
</head>
<body style ="background-color: #212121; color: #fff">
    
</body>
<script>
    const div = document.createElement('div')
    console.log(div)
    div.className = "main"
    div.id = Math.round((Math.random() *10 + 1));
    div.setAttribute('title', "Rachit's Space")
    div.style.backgroundColor = "green"
    div.style.padding = "12px" 
    // div.innerText = "Rachit's Space" //for optimised versions, what innerText does is first it brings the data and then edits/overwrites it
    // for more optimisation , we have createTextNode //it only creates and doesnt fetch the data, so it is more optimised
    const addText = document.createTextNode("Rachit's Space")
    div.appendChild(addText)

    document.body.appendChild(div)
</script>
</html>
